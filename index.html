<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D 正方体 - Lab 4</title>
    <style>
        body {
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        /* 正方体容器 */
        .cube-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin-top: 50px;
        }

        /* 共有样式 */
        .face {
            position: absolute;
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            box-sizing: border-box;
        }

        /* 正面 */
        .front {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #ef4444, #991b1b);
            z-index: 2;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 20px 20px 50px rgba(0,0,0,0.2);
        }

        /* 顶面 */
        .top {
            width: 200px;
            height: 80px;
            background: linear-gradient(to bottom, #f87171, #ef4444);
            /* 关键变换：平移并倾斜 */
            transform: translate(40px, -80px) skewX(-45deg);
            transform-origin: bottom left;
            z-index: 1;
            opacity: 0.9;
            font-size: 12px;
            text-transform: uppercase;
        }

        /* 右侧面 */
        .right {
            width: 80px;
            height: 200px;
            background: linear-gradient(to left, #991b1b, #b91c1c);
            /* 关键变换：平移并倾斜 */
            transform: translate(200px, -40px) skewY(-45deg);
            transform-origin: top left;
            z-index: 1;
            opacity: 0.9;
            font-size: 12px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="cube-container">
        <!-- 顶面 -->
        <div class="face top">Top</div>
        
        <!-- 右侧面 -->
        <div class="face right">Right</div>
        
        <!-- 正面 -->
        <div class="face front">CUBE</div>
    </div>

</body>
</html>
